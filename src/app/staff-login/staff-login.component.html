<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="staff-login.component.css">
    <title>Staff Login</title>
</head>
<body>
    <!-- src/app/staff-login/staff-login.component.html -->
<div class="login-container"> 
    <h1 class="title">ESHER CAFE</h1>
    <div class="login-box">
      <h2 class="login-header">STAFF LOGIN</h2>
      <form (ngSubmit)="onSubmit()"> <!-- Bind form submit -->
        <div class="input-group">
          <label for="username">USERNAME</label>
          <input type="text" id="username" [(ngModel)]="username" name="username" placeholder="Enter your username">
        </div>
        <div class="input-group">
          <label for="password">PASSWORD</label>
          <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Enter your password">
        </div>
        <button type="submit" class="login-button">LOGIN</button>
        <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p> <!-- Display error message if any -->
      </form>
    </div>
  </div>  
</body>
</html>
